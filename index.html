<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>コードネーム</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #617086;
        --surface: #ffffff;
        --line: #d8dee8;
        --table: #eef3ee;
        --hidden: #f7f2e8;
        --red: #c94545;
        --red-soft: #f4d6d4;
        --blue: #2f67b7;
        --blue-soft: #d8e5f7;
        --neutral: #a88b64;
        --neutral-soft: #eadfcf;
        --assassin: #20242d;
        --assassin-soft: #cfd3db;
        --focus: #21745d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(33, 116, 93, 0.08), transparent 24rem),
          linear-gradient(135deg, #f6f8fb 0%, var(--table) 100%);
        color: var(--ink);
        font-family:
          "Noto Sans JP",
          "Hiragino Kaku Gothic ProN",
          "Yu Gothic",
          Meiryo,
          system-ui,
          sans-serif;
        letter-spacing: 0;
      }

      button {
        font: inherit;
      }

      .app {
        width: min(1180px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 1.25rem;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 1rem;
        align-items: start;
        margin-bottom: 1rem;
      }

      .title-block {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
        line-height: 1.1;
      }

      .subtitle {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      .control-button {
        min-height: 2.5rem;
        padding: 0.55rem 0.85rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        box-shadow: 0 2px 0 rgba(24, 33, 47, 0.06);
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          background 140ms ease;
      }

      .control-button:hover:not(:disabled) {
        transform: translateY(-1px);
        border-color: #9fb0c7;
      }

      .control-button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .control-button.primary {
        border-color: #165f4d;
        background: #21745d;
        color: white;
      }

      .control-button[aria-pressed="true"] {
        border-color: #9a6c23;
        background: #fff2ca;
      }

      .status-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 1rem;
        align-items: stretch;
        margin-bottom: 1rem;
      }

      .status-panel,
      .score-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 10px 24px rgba(24, 33, 47, 0.08);
      }

      .status-panel {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 0;
        padding: 0.8rem;
      }

      .turn-badge {
        flex: 0 0 auto;
        min-width: 5.7rem;
        padding: 0.48rem 0.65rem;
        border-radius: 8px;
        color: white;
        font-weight: 700;
        text-align: center;
      }

      .turn-badge.red {
        background: var(--red);
      }

      .turn-badge.blue {
        background: var(--blue);
      }

      .message {
        min-width: 0;
        margin: 0;
        font-size: 1rem;
        line-height: 1.45;
      }

      .message.win {
        font-weight: 800;
      }

      .score-panel {
        display: grid;
        grid-template-columns: repeat(4, auto);
        gap: 0.75rem;
        align-items: center;
        padding: 0.75rem;
      }

      .score-item {
        display: grid;
        gap: 0.15rem;
        min-width: 4.5rem;
      }

      .score-label {
        color: var(--muted);
        font-size: 0.75rem;
      }

      .score-value {
        font-weight: 800;
        font-size: 1.1rem;
      }

      .score-value.red {
        color: var(--red);
      }

      .score-value.blue {
        color: var(--blue);
      }

      .board-shell {
        position: relative;
        overflow: hidden;
        border: 1px solid #c9d3df;
        border-radius: 8px;
        background:
          linear-gradient(90deg, rgba(33, 116, 93, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(47, 103, 183, 0.08) 1px, transparent 1px),
          #dfe8e1;
        background-size: 2.2rem 2.2rem;
        padding: 0.8rem;
        box-shadow: 0 16px 34px rgba(24, 33, 47, 0.14);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.62rem;
      }

      .card {
        position: relative;
        display: grid;
        align-content: center;
        justify-items: center;
        min-width: 0;
        min-height: 6.1rem;
        aspect-ratio: 1.26;
        padding: 0.52rem;
        border: 2px solid #d2c3a9;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.18)),
          var(--hidden);
        color: var(--ink);
        cursor: pointer;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.62),
          0 5px 0 #c9b68e,
          0 10px 16px rgba(24, 33, 47, 0.14);
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          border-color 140ms ease,
          background 140ms ease;
      }

      .card:hover:not(:disabled) {
        transform: translateY(-2px);
        border-color: #b19562;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.7),
          0 7px 0 #c9b68e,
          0 14px 20px rgba(24, 33, 47, 0.16);
      }

      .card:focus-visible,
      .control-button:focus-visible {
        outline: 3px solid rgba(33, 116, 93, 0.35);
        outline-offset: 3px;
      }

      .card:disabled {
        cursor: default;
      }

      .card-word {
        display: block;
        width: 100%;
        min-width: 0;
        overflow-wrap: anywhere;
        color: inherit;
        font-size: 1.2rem;
        font-weight: 850;
        line-height: 1.16;
        text-align: center;
      }

      .role-chip {
        position: absolute;
        top: 0.35rem;
        left: 0.35rem;
        max-width: calc(100% - 0.7rem);
        padding: 0.16rem 0.35rem;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--ink);
        font-size: 0.68rem;
        font-weight: 800;
        line-height: 1.1;
        overflow-wrap: anywhere;
      }

      .card.spy-red {
        border-color: var(--red);
        background: var(--red-soft);
      }

      .card.spy-blue {
        border-color: var(--blue);
        background: var(--blue-soft);
      }

      .card.spy-neutral {
        border-color: var(--neutral);
        background: var(--neutral-soft);
      }

      .card.spy-assassin {
        border-color: var(--assassin);
        background: var(--assassin-soft);
      }

      .card.revealed {
        transform: translateY(3px);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.34),
          0 2px 0 rgba(24, 33, 47, 0.18);
      }

      .card.revealed-red {
        border-color: #9f3030;
        background: var(--red);
        color: white;
      }

      .card.revealed-blue {
        border-color: #204d8d;
        background: var(--blue);
        color: white;
      }

      .card.revealed-neutral {
        border-color: #866a43;
        background: var(--neutral);
        color: white;
      }

      .card.revealed-assassin {
        border-color: #080a0d;
        background: var(--assassin);
        color: white;
      }

      @media (max-width: 880px) {
        .topbar,
        .status-grid {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
        }

        .score-panel {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .app {
          padding: 0.7rem;
        }

        h1 {
          font-size: 1.35rem;
        }

        .subtitle {
          font-size: 0.84rem;
        }

        .control-button {
          flex: 1 1 9rem;
          min-height: 2.7rem;
          padding: 0.5rem 0.62rem;
          font-size: 0.86rem;
        }

        .status-panel {
          align-items: flex-start;
          flex-direction: column;
        }

        .turn-badge {
          min-width: 0;
        }

        .message {
          font-size: 0.9rem;
        }

        .score-panel {
          gap: 0.5rem;
          padding: 0.55rem;
        }

        .score-item {
          min-width: 0;
        }

        .score-label {
          font-size: 0.65rem;
        }

        .score-value {
          font-size: 0.94rem;
        }

        .board-shell {
          padding: 0.42rem;
          background-size: 1.6rem 1.6rem;
        }

        .board {
          gap: 0.34rem;
        }

        .card {
          min-height: 4.35rem;
          padding: 0.34rem;
          border-width: 1px;
          box-shadow:
            inset 0 0 0 1px rgba(255, 255, 255, 0.58),
            0 3px 0 #c9b68e,
            0 7px 10px rgba(24, 33, 47, 0.13);
        }

        .card-word {
          font-size: 0.78rem;
        }

        .role-chip {
          top: 0.2rem;
          left: 0.2rem;
          max-width: calc(100% - 0.4rem);
          padding: 0.1rem 0.22rem;
          font-size: 0.52rem;
        }
      }

      @media (max-width: 390px) {
        .card {
          min-height: 3.8rem;
          padding: 0.24rem;
        }

        .card-word {
          font-size: 0.68rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const WORDS = [
        "山",
        "海",
        "空",
        "星",
        "月",
        "太陽",
        "雲",
        "雨",
        "雪",
        "風",
        "森",
        "川",
        "湖",
        "島",
        "砂漠",
        "花",
        "木",
        "鳥",
        "犬",
        "猫",
        "馬",
        "魚",
        "龍",
        "ロボット",
        "忍者",
        "侍",
        "城",
        "神社",
        "駅",
        "学校",
        "病院",
        "図書館",
        "市場",
        "銀行",
        "空港",
        "港",
        "橋",
        "道路",
        "電車",
        "船",
        "飛行機",
        "車",
        "自転車",
        "鍵",
        "手紙",
        "時計",
        "電話",
        "新聞",
        "本",
        "写真",
        "地図",
        "宝石",
        "王冠",
        "剣",
        "盾",
        "マスク",
        "薬",
        "パン",
        "寿司",
        "ラーメン",
        "お茶",
        "りんご",
        "みかん",
        "チョコ",
        "映画",
        "音楽",
        "踊り",
        "祭り",
        "花火",
        "野球",
        "サッカー",
        "将棋",
        "ゲーム",
        "魔法",
        "探偵",
        "秘密",
        "影",
        "光",
        "夢",
        "記憶",
        "未来",
        "過去",
        "時間",
        "数字",
        "言葉",
        "色",
        "音",
        "声",
        "心",
        "力",
        "速度",
        "温度",
        "氷",
        "火",
        "電気",
        "宇宙",
        "惑星",
        "衛星",
        "博士",
        "王様",
      ];

      const ROLE_POOL = [
        ...Array(9).fill("red"),
        ...Array(8).fill("blue"),
        ...Array(7).fill("neutral"),
        "assassin",
      ];

      const ROLES = {
        red: {
          label: "赤",
          fullLabel: "赤チーム",
          spyClass: "spy-red",
          revealedClass: "revealed-red",
        },
        blue: {
          label: "青",
          fullLabel: "青チーム",
          spyClass: "spy-blue",
          revealedClass: "revealed-blue",
        },
        neutral: {
          label: "市民",
          fullLabel: "市民",
          spyClass: "spy-neutral",
          revealedClass: "revealed-neutral",
        },
        assassin: {
          label: "暗殺者",
          fullLabel: "暗殺者",
          spyClass: "spy-assassin",
          revealedClass: "revealed-assassin",
        },
      };

      const TEAM_TARGETS = {
        red: 9,
        blue: 8,
      };

      function shuffle(items) {
        const copied = [...items];
        for (let index = copied.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [copied[index], copied[randomIndex]] = [copied[randomIndex], copied[index]];
        }
        return copied;
      }

      function createCards() {
        const words = shuffle(WORDS).slice(0, 25);
        const roles = shuffle(ROLE_POOL);
        const gameId = Date.now();

        return words.map((word, index) => ({
          id: `${gameId}-${index}-${word}`,
          word,
          role: roles[index],
          revealed: false,
        }));
      }

      function countRemaining(cards, role) {
        return cards.filter((card) => card.role === role && !card.revealed).length;
      }

      function getWinningTeam(cards) {
        if (countRemaining(cards, "red") === 0) {
          return "red";
        }

        if (countRemaining(cards, "blue") === 0) {
          return "blue";
        }

        return null;
      }

      function getOpponent(team) {
        return team === "red" ? "blue" : "red";
      }

      function App() {
        const [cards, setCards] = useState(() => createCards());
        const [spymaster, setSpymaster] = useState(false);
        const [activeTeam, setActiveTeam] = useState("red");
        const [winner, setWinner] = useState(null);
        const [message, setMessage] = useState("赤チームから開始");

        const remaining = useMemo(
          () => ({
            red: countRemaining(cards, "red"),
            blue: countRemaining(cards, "blue"),
            neutral: countRemaining(cards, "neutral"),
            assassin: countRemaining(cards, "assassin"),
          }),
          [cards],
        );

        function startNewGame() {
          setCards(createCards());
          setSpymaster(false);
          setActiveTeam("red");
          setWinner(null);
          setMessage("新しい盤面: 赤チームから開始");
        }

        function passTurn() {
          if (winner) {
            return;
          }

          const nextTeam = getOpponent(activeTeam);
          setActiveTeam(nextTeam);
          setMessage(`${ROLES[nextTeam].fullLabel}の番`);
        }

        function revealCard(cardId) {
          if (winner) {
            return;
          }

          const selected = cards.find((card) => card.id === cardId);
          if (!selected || selected.revealed) {
            return;
          }

          const nextCards = cards.map((card) =>
            card.id === cardId ? { ...card, revealed: true } : card,
          );

          setCards(nextCards);

          if (selected.role === "assassin") {
            const winningTeam = getOpponent(activeTeam);
            setWinner(winningTeam);
            setMessage(`暗殺者を引きました。${ROLES[winningTeam].fullLabel}の勝利`);
            return;
          }

          const winningTeam = getWinningTeam(nextCards);
          if (winningTeam) {
            setWinner(winningTeam);
            setMessage(`${ROLES[winningTeam].fullLabel}の勝利`);
            return;
          }

          if (selected.role === activeTeam) {
            setMessage(`${ROLES[activeTeam].fullLabel}のエージェントを発見`);
            return;
          }

          const nextTeam = getOpponent(activeTeam);
          setActiveTeam(nextTeam);

          if (selected.role === "neutral") {
            setMessage(`市民でした。${ROLES[nextTeam].fullLabel}の番`);
          } else {
            setMessage(`${ROLES[selected.role].fullLabel}のエージェントでした。${ROLES[nextTeam].fullLabel}の番`);
          }
        }

        function getCardClass(card) {
          const classes = ["card"];

          if (spymaster && !card.revealed) {
            classes.push(ROLES[card.role].spyClass);
          }

          if (card.revealed) {
            classes.push("revealed", ROLES[card.role].revealedClass);
          }

          return classes.join(" ");
        }

        return (
          <main className="app">
            <section className="topbar" aria-label="ゲーム操作">
              <div className="title-block">
                <h1>コードネーム</h1>
                <p className="subtitle">25枚のカードから味方をすべて見つけるチーム戦</p>
              </div>

              <div className="actions">
                <button className="control-button primary" type="button" onClick={startNewGame}>
                  新規ゲーム
                </button>
                <button
                  className="control-button"
                  type="button"
                  aria-pressed={spymaster}
                  onClick={() => setSpymaster((current) => !current)}
                >
                  スパイマスター {spymaster ? "ON" : "OFF"}
                </button>
                <button className="control-button" type="button" onClick={passTurn} disabled={Boolean(winner)}>
                  手番交代
                </button>
              </div>
            </section>

            <section className="status-grid" aria-label="ゲーム状況">
              <div className="status-panel">
                <div className={`turn-badge ${activeTeam}`}>
                  {winner ? "終了" : `${ROLES[activeTeam].label}の番`}
                </div>
                <p className={`message ${winner ? "win" : ""}`}>{message}</p>
              </div>

              <div className="score-panel" aria-label="残り枚数">
                <div className="score-item">
                  <span className="score-label">赤</span>
                  <span className="score-value red">{remaining.red}</span>
                </div>
                <div className="score-item">
                  <span className="score-label">青</span>
                  <span className="score-value blue">{remaining.blue}</span>
                </div>
                <div className="score-item">
                  <span className="score-label">市民</span>
                  <span className="score-value">{remaining.neutral}</span>
                </div>
                <div className="score-item">
                  <span className="score-label">暗殺者</span>
                  <span className="score-value">{remaining.assassin}</span>
                </div>
              </div>
            </section>

            <section className="board-shell" aria-label="カード盤面">
              <div className="board">
                {cards.map((card) => (
                  <button
                    key={card.id}
                    type="button"
                    className={getCardClass(card)}
                    onClick={() => revealCard(card.id)}
                    disabled={card.revealed || Boolean(winner)}
                    aria-label={`${card.word}: ${card.revealed || spymaster ? ROLES[card.role].fullLabel : "未公開"}`}
                  >
                    {(spymaster || card.revealed) && (
                      <span className="role-chip">{ROLES[card.role].label}</span>
                    )}
                    <span className="card-word">{card.word}</span>
                  </button>
                ))}
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
